<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kmlpxl Creative</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Noto+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Iconify -->
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP + SplitText (Club) via CDN fallback with custom split -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            playfair: ['"Playfair Display"', 'serif'],
            noto: ['"Noto Sans"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Background image */
    #bg {
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1691443297137-68818fe7bce9?q=80&w=1332&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.12);
      z-index: 0;
    }

    /* Subtle dark vignette for readability — no overlay */
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.35) 100%);
    }

    /* Layout shell */
    #shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100svh;
      min-height: 100dvh;
    }

    /* ── Clip-mask reveal helper ──
       Each .reveal-wrap clips its child; child translates up into view. */
    .reveal-wrap {
      overflow: hidden;
      display: inline-flex;
    }

    .reveal-inner {
      transform: translateY(110%);
      display: inline-flex;
      align-items: center;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #logo-text {
      font-family: 'Noto Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
    }

    /* Desktop nav */
    nav#desktop-nav {
      display: flex;
      gap: 2.5rem;
    }

    nav#desktop-nav a {
      font-family: 'Noto Sans', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav#desktop-nav a:hover { color: #fff; }

    /* Hamburger */
    #hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    #hamburger span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: #fff;
      transition: all 0.3s;
    }

    #hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    #hamburger.open span:nth-child(2) { opacity: 0; }
    #hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* Mobile drawer */
    #mobile-menu {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0,0,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #mobile-menu.open {
      opacity: 1;
      pointer-events: all;
    }

    #mobile-menu a {
      font-family: 'Noto Sans', sans-serif;
      font-weight: 300;
      font-size: 1.2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      transition: color 0.2s;
    }

    #mobile-menu a:hover { color: #fff; }

    /* ── Center content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 2rem 5rem;
    }

    #heading {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(2.8rem, 7vw, 6rem);
      line-height: 1.1;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
    }

    #subheading {
      font-family: 'Noto Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      margin-bottom: 3rem;
    }

    /* Character split containers */
    .char-line {
      display: block;
      overflow: hidden;
    }

    .char-line span.char {
      display: inline-block;
      transform: translateY(110%);
    }

    /* Button */
    #cta-btn {
      font-family: 'Noto Sans', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #000;
      background: #fff;
      border: 1.5px solid #fff;
      border-radius: 9999px;
      padding: 0.9rem 2.4rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.3s, color 0.3s;
      opacity: 0;
    }

    #cta-btn:hover {
      background: transparent;
      color: #fff;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      padding: 1.75rem 2.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    #copyright {
      font-family: 'Noto Sans', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    #social-links {
      display: flex;
      gap: 1.1rem;
      align-items: center;
    }

    #social-links a {
      color: #fff;
      display: flex;
      align-items: center;
      transition: opacity 0.2s;
    }

    #social-links a:hover { opacity: 0.65; }

    #social-links .iconify {
      width: 18px;
      height: 18px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      header { padding: 1.5rem 1.5rem; }
      footer { padding: 1.5rem 1.5rem; }
      nav#desktop-nav { display: none; }
      #hamburger { display: flex; }
      main { padding: 7rem 1.5rem 5rem; }
    }

    @media (min-width: 641px) {
      #hamburger { display: none; }
      #mobile-menu { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div id="bg"></div>

  <!-- Shell -->
  <div id="shell">

    <!-- Header -->
    <header>
      <div class="reveal-wrap">
        <div class="reveal-inner" id="logo-inner">
          <span id="logo-text">Kmlpxl Creative</span>
        </div>
      </div>

      <!-- Desktop nav -->
      <nav id="desktop-nav">
        <div class="reveal-wrap"><div class="reveal-inner nav-item"><a href="#">Work</a></div></div>
        <div class="reveal-wrap"><div class="reveal-inner nav-item"><a href="#">Studio</a></div></div>
        <div class="reveal-wrap"><div class="reveal-inner nav-item"><a href="#">Journal</a></div></div>
        <div class="reveal-wrap"><div class="reveal-inner nav-item"><a href="#">Contact</a></div></div>
      </nav>

      <!-- Hamburger -->
      <button id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </header>

    <!-- Mobile Menu -->
    <div id="mobile-menu">
      <a href="#">Work</a>
      <a href="#">Studio</a>
      <a href="#">Journal</a>
      <a href="#">Contact</a>
    </div>

    <!-- Main -->
    <main>
      <h1 id="heading">
        <span class="char-line" id="line1"></span>
        <span class="char-line" id="line2"></span>
      </h1>

      <p id="subheading">
        <span class="char-line" id="sub-line"></span>
      </p>

      <a href="#" id="cta-btn">Let's get started</a>
    </main>

    <!-- Footer -->
    <footer>
      <div class="reveal-wrap">
        <div class="reveal-inner" id="copy-inner">
          <span id="copyright">© Kmlpxl Creative All Rights Reserved 2026</span>
        </div>
      </div>

      <div id="social-links">
        <div class="reveal-wrap" style="--i:0">
          <div class="reveal-inner social-item">
            <a href="#" aria-label="Instagram">
              <span class="iconify" data-icon="mdi:instagram"></span>
            </a>
          </div>
        </div>
        <div class="reveal-wrap" style="--i:1">
          <div class="reveal-inner social-item">
            <a href="#" aria-label="Behance">
              <span class="iconify" data-icon="mdi:behance"></span>
            </a>
          </div>
        </div>
        <div class="reveal-wrap" style="--i:2">
          <div class="reveal-inner social-item">
            <a href="#" aria-label="Dribbble">
              <span class="iconify" data-icon="mdi:dribbble"></span>
            </a>
          </div>
        </div>
        <div class="reveal-wrap" style="--i:3">
          <div class="reveal-inner social-item">
            <a href="#" aria-label="X / Twitter">
              <span class="iconify" data-icon="mdi:twitter"></span>
            </a>
          </div>
        </div>
      </div>
    </footer>

  </div><!-- /shell -->

  <script>
    /* ─── Content ─────────────────────────────────────────────────── */
    const headingLines = ['Craft That', 'Speaks First.'];
    const subText      = 'Brand · Digital · Motion';

    /* ─── Split text into char spans ─────────────────────────────── */
    function splitToChars(el, text) {
      el.innerHTML = '';
      [...text].forEach(ch => {
        const s = document.createElement('span');
        s.className = 'char';
        s.textContent = ch === ' ' ? '\u00A0' : ch;
        el.appendChild(s);
      });
      return el.querySelectorAll('.char');
    }

    const line1Chars = splitToChars(document.getElementById('line1'), headingLines[0]);
    const line2Chars = splitToChars(document.getElementById('line2'), headingLines[1]);
    const subChars   = splitToChars(document.getElementById('sub-line'), subText);

    /* ─── Hamburger ───────────────────────────────────────────────── */
    const hamburger  = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    /* ─── GSAP Timeline ───────────────────────────────────────────── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // 1. Logo
    tl.to('#logo-inner', { y: '0%', duration: 0.8 }, 0.2)

    // 2. Nav items (desktop) — staggered
    .to('.nav-item', { y: '0%', duration: 0.7, stagger: 0.08 }, 0.45)

    // 3. Heading line 1 chars
    .to(line1Chars, { y: '0%', duration: 0.75, stagger: 0.03 }, 0.85)

    // 4. Heading line 2 chars
    .to(line2Chars, { y: '0%', duration: 0.75, stagger: 0.03 }, 1.15)

    // 5. Sub-heading chars
    .to(subChars, { y: '0%', duration: 0.6, stagger: 0.025 }, 1.55)

    // 6. CTA button fade in
    .to('#cta-btn', { opacity: 1, duration: 0.6, ease: 'power2.out' }, 1.9)

    // 7. Copyright
    .to('#copy-inner', { y: '0%', duration: 0.7 }, 2.05)

    // 8. Social icons staggered
    .to('.social-item', { y: '0%', duration: 0.6, stagger: 0.08 }, 2.2)

    // 9. Background — fade + zoom out (after everything else)
    .to('#bg', { opacity: 1, scale: 1, duration: 2.2, ease: 'power2.inOut' }, 0.05);

  </script>
</body>
</html>
